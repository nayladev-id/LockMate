name: Build Android App Bundle

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - run: flutter pub get

      # ✅ FIX: Gunakan env var + tr untuk strip CRLF dari Windows
      - name: Decode Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | tr -d '\r\n ' | base64 --decode > android/app/upload-keystore.jks

      # ✅ FIX: Generate key.properties dari secrets, jangan andalkan file di repo
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../app/upload-keystore.jks
          EOF

      # ✅ BARU: Verifikasi keystore valid SEBELUM build — early fail
      - name: Verify Keystore
        run: |
          keytool -list \
            -keystore android/app/upload-keystore.jks \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -noprompt
          echo "✅ Keystore valid!"

      - run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: build/app/outputs/bundle/release/app-release.aab